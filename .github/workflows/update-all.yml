name: Update CCAM data and watch

on:
  workflow_dispatch:
  push:
    paths:
      - .github/update-request.txt
      - scripts/update_all.py
      - scripts/enrich_articles.py
      - .github/workflows/update-all.yml
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: annuaire-ccam-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber

      - name: Synchroniser la base CCAM
        run: python scripts/update_all.py

      - name: Générer les dossiers blog depuis Ameli
        run: python scripts/enrich_articles.py

      - name: Vérifier les changements
        run: |
          git status
          git diff --stat

      - name: Commit automatique si changement
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Synchronisation CCAM et dossiers Ameli dynamiques"
          file_pattern: data/app-data.json data/app-data.js data/sync-status.json
