name: Update CCAM data and watch

on:
  workflow_dispatch:
  push:
    paths:
      - .github/update-request.txt
      - scripts/update_all.py
      - scripts/enrich_articles.py
      - scripts/enrich_articles_playwright.py
      - scripts/ensure_articles.py
      - scripts/ai_review_articles.py
      - scripts/validate_public_data.py
      - .github/workflows/update-all.yml
  schedule:
    # Deux passages quotidiens suffisent pour une donnée institutionnelle :
    # fiable, moins bruyant, plus respectueux des sources, moins de commits inutiles.
    - cron: "17 5,17 * * *"

concurrency:
  group: annuaire-ccam-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber playwright
          python -m playwright install --with-deps chromium

      - name: Synchroniser la base CCAM
        run: python scripts/update_all.py

      - name: Générer les vrais dossiers Ameli avec Playwright
        run: python scripts/enrich_articles_playwright.py

      - name: Générer les dossiers blog depuis Ameli en repli léger
        run: python scripts/enrich_articles.py
        if: always()

      - name: Garantir des dossiers publics si les crawls sont vides
        run: python scripts/ensure_articles.py

      - name: Relire les dossiers avec Gemini si disponible
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          AI_REVIEW_MAX_ARTICLES: "12"
        run: python scripts/ai_review_articles.py

      - name: Valider les données avant publication
        run: python scripts/validate_public_data.py

      - name: Vérifier les changements
        run: |
          git status
          git diff --stat

      - name: Commit automatique si changement
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Synchronisation CCAM validée pour publication"
          file_pattern: data/app-data.json data/app-data.js data/sync-status.json
