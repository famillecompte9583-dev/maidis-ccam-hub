name: Update CCAM data and watch

on:
  workflow_dispatch:
  push:
    paths:
      - .github/update-request.txt
      - scripts/update_all.py
      - scripts/enrich_articles_official_sources.py
      - scripts/filter_medical_regulatory_news.py
      - scripts/enrich_public_api_sources.py
      - scripts/enrich_articles_jina.py
      - scripts/enrich_articles_playwright.py
      - scripts/ensure_articles.py
      - scripts/ai_review_articles.py
      - scripts/validate_public_data.py
      - .github/workflows/update-all.yml
  schedule:
    # Deux passages quotidiens suffisent pour une donnée institutionnelle :
    # fiable, moins bruyant, plus respectueux des sources, moins de commits inutiles.
    - cron: "17 5,17 * * *"

concurrency:
  group: annuaire-ccam-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber playwright
          python -m playwright install --with-deps chromium

      - name: Synchroniser la base CCAM
        run: python scripts/update_all.py

      - name: Extraire les dossiers depuis sources officielles stables
        run: python scripts/enrich_articles_official_sources.py

      - name: Filtrer la veille réglementaire CCAM et Assurance maladie
        run: python scripts/filter_medical_regulatory_news.py

      - name: Intégrer api.gouv data.gouv FHIR et MCP
        run: python scripts/enrich_public_api_sources.py

      - name: Tenter Ameli/Jina/Playwright seulement si aucune source stable ne produit d'article
        run: |
          python - <<'PY'
          import json, pathlib, subprocess, sys
          path = pathlib.Path('data/app-data.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          if data.get('articles'):
              print(f"Sources officielles stables/API : {len(data['articles'])} article(s), Ameli protégé ignoré.")
          else:
              try:
                  subprocess.check_call([sys.executable, 'scripts/enrich_articles_jina.py'])
              except Exception as exc:
                  print(f"Jina ignoré : {exc}")
              data = json.loads(path.read_text(encoding='utf-8'))
              if not data.get('articles'):
                  subprocess.check_call([sys.executable, 'scripts/enrich_articles_playwright.py'])
          PY

      - name: Refiltrer après fallback éventuel
        run: python scripts/filter_medical_regulatory_news.py

      - name: Garder le site honnête si aucune source ne donne d'article
        run: python scripts/ensure_articles.py

      - name: Relire densément les dossiers avec Gemini si disponible
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          AI_REVIEW_MAX_ARTICLES: "12"
          AI_REVIEW_TEMPERATURE: "0.3"
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/ai_review_articles.py')
          old = '"temperature": 0.1,'
          new = '"temperature": float(os.environ.get("AI_REVIEW_TEMPERATURE", "0.3")),'
          text = path.read_text(encoding='utf-8')
          if old in text:
              text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          elif new not in text:
              raise SystemExit('Température Gemini non patchée : signature inattendue.')
          PY
          python scripts/ai_review_articles.py

      - name: Valider les données avant publication
        run: python scripts/validate_public_data.py

      - name: Vérifier les changements
        run: |
          git status
          git diff --stat

      - name: Commit automatique si changement
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Synchronisation CCAM validée pour publication"
          file_pattern: data/app-data.json data/app-data.js data/sync-status.json
